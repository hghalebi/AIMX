<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 960 280">
  <title>AIMX logo</title>
  <desc>
    Original AIMX wordmark with an abstract on-device model symbol and connected
    inference nodes.
  </desc>
  <defs>
    <linearGradient id="aimx-panel" x1="60" y1="42" x2="250" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#164E63"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="aimx-signal" x1="92" y1="70" x2="224" y2="207" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="aimx-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="960" height="280" rx="28" fill="#F8FAFC"/>
  <g filter="url(#aimx-shadow)">
    <rect x="58" y="38" width="204" height="204" rx="46" fill="url(#aimx-panel)"/>
  </g>

  <g fill="none" stroke="url(#aimx-signal)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M112 190L158 86l48 104" stroke-width="18"/>
    <path d="M132 149h52" stroke-width="14"/>
    <path d="M205 89v102" stroke-width="14"/>
    <path d="M96 87h28m82 0h28M96 192h28m82 0h28" stroke-width="10"/>
  </g>

  <g fill="#F8FAFC">
    <circle cx="96" cy="87" r="9"/>
    <circle cx="234" cy="87" r="9"/>
    <circle cx="96" cy="192" r="9"/>
    <circle cx="234" cy="192" r="9"/>
  </g>

  <g fill="#0F172A">
    <text x="310" y="146"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="94" font-weight="800" letter-spacing="0">AIMX</text>
    <text x="315" y="190"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="25" font-weight="600" letter-spacing="0" fill="#334155">
      apple-intelligence-models
    </text>
  </g>

  <path d="M312 212h406" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <g fill="#0F766E">
    <circle cx="742" cy="212" r="6"/>
    <circle cx="770" cy="212" r="6"/>
    <circle cx="798" cy="212" r="6"/>
  </g>
</svg>
