name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: crates-io-release
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-

      - name: Check tag matches Cargo version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          cargo_version="$(cargo pkgid | sed 's/.*@//')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "Tag v${tag_version} does not match Cargo version ${cargo_version}" >&2
            exit 1
          fi

      - name: Format
        run: cargo fmt --check

      - name: Test library
        run: cargo test

      - name: Test examples
        run: cargo test --examples

      - name: Compile benchmarks
        run: cargo bench --bench core --no-run

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

      - name: Primitive-boundary policy
        run: bash scripts/find_raw_primitives.sh

      - name: Package contents
        run: cargo package --list

      - name: Package verification
        run: cargo package

  publish:
    name: Publish crates.io
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check tag matches Cargo version
        run: |
          set -euo pipefail
          cargo_version="$(cargo pkgid | sed 's/.*@//')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "Tag v${tag_version} does not match Cargo version ${cargo_version}" >&2
            exit 1
          fi

      - name: Authenticate crates.io trusted publishing
        id: auth
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
