name: Local CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Rust library quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-stable-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-stable-cargo-

      - name: Format
        run: cargo fmt --check

      - name: Test library
        run: cargo test

      - name: Test examples
        run: cargo test --examples

      - name: Compile benchmarks
        run: cargo bench --bench core --no-run

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

      - name: Primitive-boundary policy
        run: bash scripts/find_raw_primitives.sh

      - name: Package contents
        run: cargo package --list

      - name: Package verification
        run: cargo package

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.85
        run: rustup toolchain install 1.85.0 --profile minimal

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-1.85-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-1.85-cargo-

      - name: Test library
        run: cargo +1.85.0 test

      - name: Test examples
        run: cargo +1.85.0 test --examples
